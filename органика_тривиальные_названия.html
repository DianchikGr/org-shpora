<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Органика — тривиальные названия | @edu_Dianchik.gr</title>
<script src="https://cdn.jsdelivr.net/npm/smiles-drawer@2.1.7/dist/smiles-drawer.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F1EB;
  --card:#FFFFFF;
  --blk:#1A1A18;
  --muted:#6B6B66;
  --amb:#BA7517;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--blk);min-height:100vh}

.site-header{
  position:sticky;top:0;z-index:100;
  background:var(--blk);color:#fff;
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  box-shadow:0 2px 12px rgba(0,0,0,.28);
}
.site-header h1{font-size:1.05rem;font-weight:700;white-space:nowrap}
.site-header h1 span{color:#F0C040}
.brand{font-size:.78rem;color:#999;white-space:nowrap}
.search-wrap{flex:1;max-width:320px}
.search-wrap input{
  width:100%;padding:7px 14px;border-radius:25px;border:none;outline:none;
  font-size:.88rem;background:#2E2E2C;color:#fff;
}
.search-wrap input::placeholder{color:#888}

.filter-bar{
  position:sticky;top:52px;z-index:90;
  background:var(--bg);border-bottom:1px solid #ddd;
  padding:9px 20px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;
}
.filter-bar button{
  padding:4px 12px;border-radius:20px;border:1.5px solid #ccc;
  background:#fff;cursor:pointer;font-size:.79rem;font-weight:600;
  transition:all .16s;white-space:nowrap;
}
.filter-bar button.active,.filter-bar button:hover{
  border-color:var(--amb);background:var(--amb);color:#fff;
}
.count-label{font-size:.8rem;color:var(--muted);margin-left:auto;white-space:nowrap}

.grid-wrap{padding:18px 20px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(258px,1fr));
  gap:15px;
}

.card{
  background:var(--card);border-radius:14px;
  box-shadow:0 2px 12px rgba(0,0,0,.07);
  overflow:hidden;display:flex;flex-direction:column;
  transition:transform .15s,box-shadow .15s;
}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 22px rgba(0,0,0,.13)}
.cb{height:5px;width:100%}
.card-body{padding:13px 15px 11px;flex:1;display:flex;flex-direction:column;gap:5px}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.trivial{font-size:1rem;font-weight:700;line-height:1.25;color:var(--blk)}
.cls-badge{
  font-size:.66rem;font-weight:700;padding:2px 7px;border-radius:12px;
  white-space:nowrap;flex-shrink:0;margin-top:2px;color:#fff;
}
.iupac{font-size:.75rem;color:var(--muted);font-style:italic}
.formula-row{font-size:.9rem;font-weight:700;letter-spacing:.03em;color:var(--blk)}

/* STATE + COLOR META ROW */
.meta-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:1px}
.state-pill{
  font-size:.67rem;font-weight:700;padding:2px 7px;border-radius:9px;
  display:inline-flex;align-items:center;gap:3px;
}
.s-gas  {background:#E3F2FD;color:#1565C0}
.s-liq  {background:#E8F5E9;color:#2E7D32}
.s-sol  {background:#F3E5F5;color:#6A1B9A}
.color-marker{
  display:inline-flex;align-items:center;gap:4px;
  font-size:.68rem;color:#555;font-weight:600;
}
.color-dot{
  width:11px;height:11px;border-radius:50%;
  border:1px solid rgba(0,0,0,.15);display:inline-block;flex-shrink:0;
}

/* STRUCTURE BOX */
.struct-box{
  height:148px;background:#FAFAF7;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  margin:3px 0;overflow:hidden;position:relative;
}
.struct-box canvas{max-width:100%;max-height:100%;display:block}
.fallback{
  font-size:.95rem;font-weight:700;color:var(--blk);
  text-align:center;padding:6px;line-height:1.55;
}

.fact{
  font-size:.74rem;color:var(--muted);line-height:1.45;
  border-left:3px solid #e8e4da;padding-left:7px;margin-top:3px;
}
.fact b{color:var(--amb)}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:1rem;display:none}
.site-footer{text-align:center;padding:22px;font-size:.76rem;color:var(--muted)}
.site-footer a{color:var(--amb);text-decoration:none}
</style>
</head>

  <span class="count-label" id="countLabel">62 карточки</span>

<div class="grid-wrap">

/* ── ПОСТРОЕНИЕ КАРТОЧКИ ── */
function stateCls(s){
  if(s==='газ') return 's-gas';
  if(s==='жидкость') return 's-liq';
  return 's-sol';
}
function stateIcon(s){
  if(s==='газ') return '💨';
  if(s==='жидкость') return '💧';
  return '◆';
}

function buildCard(d){
  const color = CLR[d.cls]||'#546E7A';

  let colorHTML = '';
  if(d.colorNote){
    const dot = d.colorNote.hex
      ? `<span class="color-dot" style="background:${d.colorNote.hex}"></span>`
      : '';
    colorHTML = `<span class="color-marker">${dot}${d.colorNote.name}</span>`;
  }

  const canvasOrFallback = d.smiles
    ? `<canvas id="cv-${d.id}" width="230" height="140"></canvas>`
    : `<div class="fallback">${d.formula}</div>`;

  return `
  <div class="card"
    data-cls="${d.cls}"
    data-search="${(d.trivial+d.formula+d.iupac+d.cls+(d.colorNote?d.colorNote.name:'')).toLowerCase()}">
    <div class="cb" style="background:${color}"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="trivial">${d.trivial}</div>
        <div class="cls-badge" style="background:${color}">${d.cls}</div>
      </div>
      <div class="iupac">ИЮПАК: ${d.iupac}</div>
      <div class="formula-row">${d.formula}</div>
      <div class="meta-row">
        <span class="state-pill ${stateCls(d.state)}">${stateIcon(d.state)} ${d.state}</span>
        ${colorHTML}
      </div>
      <div class="struct-box" id="box-${d.id}">${canvasOrFallback}</div>
      <div class="fact">${d.fact}</div>
    </div>
  </div>`;
}

/* ── ФИЛЬТРАЦИЯ ── */
let currentFilter='all', currentSearch='';

function applyFilter(){
  const cards = document.querySelectorAll('.card');
  let vis=0;
  cards.forEach(c=>{
    const cm = currentFilter==='all'||c.dataset.cls===currentFilter;
    const sm = !currentSearch||c.dataset.search.includes(currentSearch);
    const show = cm&&sm;
    c.style.display = show?'':'none';
    if(show) vis++;
  });
  document.getElementById('countLabel').textContent = vis+' карточек';
  document.getElementById('empty').style.display = vis===0?'block':'none';
}

function renderCards(){
  document.getElementById('grid').innerHTML = DATA.map(buildCard).join('');
  applyFilter();
}

/* ── SMILES-DRAWER ── */
function drawAllSmiles(){
  if(typeof SmilesDrawer==='undefined'){ DATA.forEach(showFallback); return; }

  const sd = new SmilesDrawer.Drawer({
    width:230, height:140, bondThickness:1.5,
    themes:{
      light:{
        C:'#1A1A18', N:'#1565C0', O:'#C62828',
        S:'#BA7517', Cl:'#2E7D32', Br:'#6A1B9A',
        F:'#00695C', P:'#AD1457',
        BACKGROUND:'#FAFAF7'
      }
    }
  });

  DATA.forEach(d=>{
    if(!d.smiles) return;
    const cv = document.getElementById('cv-'+d.id);
    if(!cv) return;
    SmilesDrawer.parse(d.smiles,
      tree=>{ try{ sd.draw(tree,'cv-'+d.id,'light',false); }catch(e){ showFallback(d); } },
      ()=>{ showFallback(d); }
    );
  });
}

function showFallback(d){
  const box = document.getElementById('box-'+d.id);
  if(box) box.innerHTML=`<div class="fallback">${d.formula}</div>`;
}

/* ── СОБЫТИЯ ── */
document.getElementById('filterBar').addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON') return;
  document.querySelectorAll('.filter-bar button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.cls;
  applyFilter();
});

document.getElementById('search').addEventListener('input',e=>{
  currentSearch = e.target.value.trim().toLowerCase();
  applyFilter();
});

document.addEventListener('DOMContentLoaded', renderCards);
window.addEventListener('load', drawAllSmiles);
</script>
